name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"            # e.g. v0.1.9
          VER="${TAG#v}"                       # e.g. 0.1.9
          echo "ver=$VER" >> "$GITHUB_OUTPUT"

      - name: Sync version into project files
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.ver }}"

          # --- tauri.conf.json ---
          $tauriConf = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $tauriConf.version = $ver
          $tauriConf | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json

          # --- Cargo.toml (only the [package] version line) ---
          $cargo = Get-Content src-tauri/Cargo.toml -Raw
          $cargo = $cargo -replace '(?m)^(version\s*=\s*")[^"]+"', "`${1}$ver`""
          Set-Content src-tauri/Cargo.toml $cargo

          # --- package.json ---
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $pkg.version = $ver
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json

      - name: Install dependencies
        run: npm install

      - name: Build Tauri application
        run: npm run tauri build

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
